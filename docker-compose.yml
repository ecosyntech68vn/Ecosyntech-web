version: '3.8'
services:
  ecosyntech-backend:
    build: .
    container_name: ecosyntech-backend
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-prod-secret}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-prod-webhook-secret}
      - MQTT_BROKER_URL=${MQTT_BROKER_URL:-}
      - DB_PATH=/data/ecosyntech.db
    ports:
      - '3000:3000'
    volumes:
      - ./data:/data
    restart: unless-stopped
