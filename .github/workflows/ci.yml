name: CI
permissions:
  contents: write
  pull-requests: write
  actions: read
  checks: read

on:
  push:
    branches: [ main, '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test:ci

      - name: Build
        run: npm run build
      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc
      - name: Generate Runbook PDF and Commit
        run: bash scripts/generate_runbook_pdf.sh
      - name: PR All-In Release (auto)
        if: always()
        env:
          GH_PAT_FOR_PR: ${{ secrets.GH_PAT }}
          NOTIFY_CHANNEL: telegram,email
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          PR_HEAD: final-all-in
          PR_BASE: main
          PR_TITLE: "Release All-In 2.0.0"
          PR_BODY: "All-In release with PR automation, bootstrap, dockerization, runbook, and tests."
        run: node scripts/pr-auto-merge.js
