# ============================================================================
# EcoSynTech - All-in-One Docker Compose
# Designed for Vietnamese Farmers - Simple 1-Command Deployment
# ============================================================================
#
# USAGE:
#   docker-compose up -d
#
# ACCESS:
#   Web UI:    http://localhost:3000
#   API:       http://localhost:3000/api
#   Health:    http://localhost:3000/api/health
#
# QUICK START:
#   1. docker-compose up -d
#   2. Open browser at http://localhost:3000
#   3. Login with admin/admin123
#
# ============================================================================

version: '3.8'

services:
  # Main API Server
  ecosyntech:
    image: node:18-alpine
    container_name: ecosyntech-local
    working_dir: /app
    volumes:
      - ./:/app
      - ecosyntech-data:/app/data
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/data/ecosyntech.db
    command: npm start
    restart: unless-stopped
    networks:
      - ecosyntech-net

  # MQTT Broker (for IoT devices)
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: ecosyntech-mqtt
    volumes:
      - mosquitto-data:/mosquitto/data
      - mosquitto-logs:/mosquitto/log
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    ports:
      - "1883:1883"
      - "9001:9001"
    restart: unless-stopped
    networks:
      - ecosyntech-net

  # Nginx (Reverse Proxy & Static Files)
  nginx:
    image: nginx:alpine
    container_name: ecosyntech-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./public:/usr/share/nginx/html:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - ecosyntech
    restart: unless-stopped
    networks:
      - ecosyntech-net

networks:
  ecosyntech-net:
    driver: bridge

volumes:
  ecosyntech-data:
  mosquitto-data:
  mosquitto-logs: