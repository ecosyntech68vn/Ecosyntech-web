# Prometheus configuration file

# Global configuration
global:
  scrape_interval: 15s  # Set the default scrape interval to 15 seconds

# Scrape configurations
scrape_configs:
  - job_name: 'ecosyntech-backend'
    static_configs:
      - targets: ['ecosyntech-backend:9090']
  - job_name: 'mqtt-broker'
    static_configs:
      - targets: ['mqtt-broker:1883']
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
